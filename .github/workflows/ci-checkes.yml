name: ci-checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches: [ main ]

env:
  NODE_VERSION: '20.18.1'
  PNPM_VERSION: '9.12.0'

jobs:
  # ---------------------------------
  # 1. Lint & Format チェック
  # ---------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

  # ---------------------------------
  # 2. 型チェック
  # ---------------------------------
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma
        run: pnpm prisma generate

      - name: Type check
        run: pnpm run type-check

  # ---------------------------------
  # 3. ビルドチェック
  # ---------------------------------
  build:
    needs: [lint, type-check]
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

